#cloud-config

hostname: k3s-control

package_update: true
package_upgrade: false

packages:
  - curl
  - wget
  - git
  - apt-transport-https
  - ca-certificates
  - gnupg
  - jq
  - net-tools
  - nfs-common

# Disable swap - hard requirement for Kubernetes
bootcmd:
  - swapoff -a
  - sed -i '/swap/d' /etc/fstab

# Load required kernel modules
modules:
  - name: overlay
  - name: br_netfilter

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

runcmd:
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system
